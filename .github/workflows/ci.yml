name: CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  rust-quality:
    name: Rust Quality (fmt + clippy, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  cargo-audit:
    name: Cargo Audit (security advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Run cargo audit
        run: cargo audit

  rust-build:
    name: Rust Build (workspace, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo build
        run: cargo build --workspace

  rust-tests:
    name: Rust Tests (workspace, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --workspace

  coverage:
    name: Coverage (cargo-llvm-cov, 80% line gate)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          key: coverage-instrumented-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Run tests under coverage instrumentation
        run: cargo llvm-cov --workspace --no-report
      - name: Print coverage summary
        run: cargo llvm-cov report --summary-only
      - name: Generate LCOV report
        run: cargo llvm-cov report --lcov --output-path lcov.info
      - name: Generate HTML report
        run: cargo llvm-cov report --html --output-dir coverage
      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage/*
          if-no-files-found: error
      - name: Upload LCOV report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
          if-no-files-found: error
      # Enforce the SPEC §P7 line-coverage target. Runs after artifact upload
      # so reports remain available for debugging even when the gate fails.
      # Baseline observed on this job: ~88% lines (see docs/PLAN.md PR-14.9).
      - name: Enforce line-coverage gate (fail-under-lines 80)
        run: cargo llvm-cov report --summary-only --fail-under-lines 80

  e2e-tests:
    name: E2E Tests (ingest -> query)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run ingestion E2E integration tests
        run: cargo test -p ingestion --test e2e_pipeline_test -- --nocapture

  ann-recall-gate:
    name: ANN Recall@k Gate (HNSW vs Linear ground-truth)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run HNSW recall@k and correctness tests
        run: cargo test -p storage --test ann_hnsw_test -- --nocapture

  bench-smoke:
    name: Benchmark Gate (operational latency)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run operational latency benchmark with thresholds
        env:
          ALAYASIKI_BENCH_NODES: "4000"
          ALAYASIKI_BENCH_WORKERS: "6"
          ALAYASIKI_BENCH_OPS_PER_WORKER: "100"
          ALAYASIKI_BENCH_WRITE_EVERY: "10"
          ALAYASIKI_BENCH_MAX_READ_P95_MS: "50"
          ALAYASIKI_BENCH_MAX_WRITE_P95_MS: "250"
          ALAYASIKI_BENCH_MIN_THROUGHPUT: "200"
        # The durable (fsync-per-write) path is highly sensitive to disk
        # contention on shared runners (observed >10x throughput variance
        # between identical commits). Retry up to 3 times to filter transient
        # contention noise; a real regression fails every attempt.
        run: |
          set +e
          attempts=3
          for i in $(seq 1 $attempts); do
            echo "==> bench attempt $i/$attempts"
            cargo bench -p prototypes --bench operational_latency_bench
            code=$?
            if [ $code -eq 0 ]; then
              echo "==> benchmark gate passed (attempt $i)"
              exit 0
            fi
            echo "==> attempt $i failed with code $code"
          done
          echo "==> benchmark gate failed after $attempts attempts"
          exit 1

  graphrag-bench-gate:
    name: Benchmark Gate (graphrag p95 thresholds)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run graphrag production benchmark with regression thresholds
        env:
          ALAYASIKI_GRAPHRAG_SEED_NODES: "4000"
          ALAYASIKI_GRAPHRAG_WORKERS: "6"
          ALAYASIKI_GRAPHRAG_WARMUP_OPS: "20"
          ALAYASIKI_GRAPHRAG_MEASURED_OPS: "100"
          ALAYASIKI_GRAPHRAG_WRITE_EVERY: "10"
          ALAYASIKI_GRAPHRAG_TOP_K: "24"
          ALAYASIKI_GRAPHRAG_DEPTH: "2"
          ALAYASIKI_GRAPHRAG_RESULTS_PATH: "/tmp/graphrag_production_ci.json"
          ALAYASIKI_GRAPHRAG_MIN_THROUGHPUT: "120"
          ALAYASIKI_GRAPHRAG_MAX_READ_P95_MS: "80"
          ALAYASIKI_GRAPHRAG_MAX_WRITE_P95_MS: "250"
        # See bench-smoke: shared-runner disk contention causes >10x perf
        # variance, so retry the gate up to 3 times.
        run: |
          set +e
          attempts=3
          for i in $(seq 1 $attempts); do
            echo "==> bench attempt $i/$attempts"
            cargo bench -p prototypes --bench graphrag_production_bench
            code=$?
            if [ $code -eq 0 ]; then
              echo "==> benchmark gate passed (attempt $i)"
              exit 0
            fi
            echo "==> attempt $i failed with code $code"
          done
          echo "==> benchmark gate failed after $attempts attempts"
          exit 1

  python-ann-bench:
    name: Python ANN Benchmark + Baseline Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python benchmark dependencies
        run: pip install -r benchmarks/requirements.txt
      - name: Run Python ANN benchmark
        run: python benchmarks/ann_benchmark.py --n-samples 10000 --n-dims 128 --n-queries 100 --top-k 10 --seed 42 --json-output benchmarks/results/ann_latest.json --png-output benchmarks/results/ann_benchmark_results.png
      - name: Check ANN regression against baseline
        run: python benchmarks/check_ann_regression.py --baseline benchmarks/baselines/ann_baseline.json --current benchmarks/results/ann_latest.json --max-regression-ratio 2.0
      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-ann-benchmark-results
          path: benchmarks/results/*

  ui-quality:
    name: UI Quality (build + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: ./ui
        run: npm install
      - name: Lint
        working-directory: ./ui
        run: npm run lint
      - name: Build
        working-directory: ./ui
        run: npm run build
